[defaults]
inventory = inventory/hosts.yml
roles_path = roles
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections
# host_key_checking = True es el valor seguro para producción.
# Para la primera conexión a un servidor nuevo, acepta la clave una vez con:
#   ssh-keyscan -H <ip> >> ~/.ssh/known_hosts
# o usa temporalmente: ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook ...
host_key_checking = True
stdout_callback = yaml
interpreter_python = auto_silent
retry_files_enabled = False

[privilege_escalation]
become = True
become_method = sudo
