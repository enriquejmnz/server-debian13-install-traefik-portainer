---
# tasks/install.yml - Generar y desplegar archivos de configuración de Traefik y Portainer
- name: Generate Traefik htpasswd hash
  ansible.builtin.shell: |
    echo "{{ traefik_password }}" | htpasswd -ni "{{ traefik_user }}"
  register: traefik_auth_output
  changed_when: false
  no_log: true
  when: traefik_password | length > 0

- name: Set traefik_auth fact
  ansible.builtin.set_fact:
    traefik_auth: "{{ traefik_auth_output.stdout }}"
  when: traefik_password | length > 0

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ install_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart Traefik Portainer stack

- name: Deploy traefik.yml
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ install_dir }}/traefik-data/traefik.yml"
    mode: "0644"
  notify: Restart Traefik Portainer stack

- name: Deploy dynamic.yml
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ install_dir }}/traefik-data/configurations/dynamic.yml"
    mode: "0640"
    owner: root
    group: docker
  notify: Restart Traefik Portainer stack

- name: Create acme.json
  ansible.builtin.file:
    path: "{{ install_dir }}/traefik-data/acme.json"
    state: touch
    mode: "0600"
    owner: root
    group: docker
    modification_time: preserve
    access_time: preserve

- name: Ensure UFW allows HTTP and HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
  when: "'ufw' in ansible_facts.packages"

- name: Deploy Traefik and Portainer stack
  community.docker.docker_compose_v2:
    project_src: "{{ install_dir }}"
    state: present
    pull: missing
  register: compose_result
  tags:
    - traefik
    - portainer
    - deploy

- name: Verify Traefik container is running
  community.docker.docker_container_info:
    name: traefik
  register: traefik_container
  failed_when: not traefik_container.exists or not traefik_container.container.State.Running
  tags:
    - traefik
    - portainer
    - verify

- name: Verify Portainer container is running
  community.docker.docker_container_info:
    name: portainer
  register: portainer_container
  failed_when: not portainer_container.exists or not portainer_container.container.State.Running
  tags:
    - traefik
    - portainer
    - verify
