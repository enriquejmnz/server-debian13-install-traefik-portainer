---
# tasks/daemon.yml - Configurar daemon.json y usuario Docker
- name: Create Docker config directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Deploy Docker daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

- name: Create Docker user
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
    shell: /bin/bash
    state: present
  when: docker_user | length > 0

- name: Add existing user to Docker group
  ansible.builtin.group:
    name: docker
    state: present
  failed_when: false

- name: Add user to Docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  when:
    - docker_user | length > 0
    - docker_user_exists | bool

- name: Check if Docker user exists
  ansible.builtin.command: id "{{ docker_user }}"
  register: docker_user_check
  failed_when: false
  changed_when: false
  when: docker_user | length > 0

- name: Set docker_user_exists fact
  ansible.builtin.set_fact:
    docker_user_exists: "{{ docker_user_check.rc == 0 }}"
  when: docker_user | length > 0
