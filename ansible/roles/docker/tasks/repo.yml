---
# tasks/repo.yml - Configurar repositorio oficial de Docker
- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Create Docker GPG key directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker architecture fact
  ansible.builtin.set_fact:
    docker_arch: >-
      {{ 'amd64' if ansible_architecture == 'x86_64'
         else ('arm64' if ansible_architecture == 'aarch64'
         else ansible_architecture) }}

- name: Download Docker GPG key (armored)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /tmp/docker.asc
    mode: "0644"
    force: true

- name: Dearmor Docker GPG key
  ansible.builtin.shell: |
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ common_debian_release }} stable"
    state: present
    filename: docker
  when: ansible_distribution == "Debian"
