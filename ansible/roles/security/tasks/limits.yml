---
# tasks/limits.yml - Configurar límites del sistema
- name: Deploy limits.conf
  ansible.builtin.template:
    src: limits.conf.j2
    dest: /etc/security/limits.conf
    mode: "0644"

- name: Create systemd conf.d for limits
  ansible.builtin.copy:
    dest: /etc/systemd/system.conf.d/limits.conf
    content: |
      [Manager]
      DefaultLimitNOFILE={{ system_nofile_limit }}
      DefaultLimitNPROC={{ system_nproc_limit }}
    mode: "0644"
  notify: Reload systemd
