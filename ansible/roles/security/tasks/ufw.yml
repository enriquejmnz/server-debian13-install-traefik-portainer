---
# tasks/ufw.yml - Configurar UFW firewall
- name: Reset UFW to clean state
  community.general.ufw:
    state: reset
  ignore_errors: true
  tags:
    - security
    - ufw

- name: Set UFW default deny incoming policy
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set UFW default allow outgoing policy
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port | string }}"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
