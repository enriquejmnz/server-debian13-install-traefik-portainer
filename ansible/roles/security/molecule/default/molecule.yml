---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: debian12
    image: geerlingguy/docker-debian12-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    pre_build_image: true
    capabilities:
      - NET_ADMIN
      - NET_RAW
  - name: debian13
    image: geerlingguy/docker-debian13-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    pre_build_image: true
    capabilities:
      - NET_ADMIN
      - NET_RAW
provisioner:
  name: ansible
  # Skip UFW and auditd — they require kernel features unavailable in Docker
  ansible_args:
    - --skip-tags=ufw,auditd
verifier:
  name: testinfra
