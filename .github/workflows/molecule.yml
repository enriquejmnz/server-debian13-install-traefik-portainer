---
name: Molecule Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:

jobs:
  molecule:
    name: Molecule - ${{ matrix.role }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role: [common, security, docker, traefik_portainer, update]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ansible molecule molecule-plugins[docker] pytest pytest-testinfra

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run Molecule tests
        run: molecule test
        working-directory: ansible/roles/${{ matrix.role }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_NO_LOG: 'false'
